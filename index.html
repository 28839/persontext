<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBTI星座人格实验室 | 你的宇宙嘴替</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0a12;
            --bg-card: #13132a;
            --bg-card-hover: #1a1a3a;
            --accent-primary: #e94560;
            --accent-secondary: #533483;
            --accent-gold: #f5c518;
            --text-primary: #eeeef0;
            --text-muted: #8888a0;
            --text-dim: #555570;
            --success: #4cc9f0;
            --border: rgba(233,69,96,0.15);
            --glow: rgba(233,69,96,0.3);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }
        /* 背景装饰 */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(83,52,131,0.12) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 80%, rgba(233,69,96,0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 50% 50%, rgba(76,201,240,0.04) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
            animation: bgFloat 20s ease-in-out infinite;
        }
        @keyframes bgFloat {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(2%, -1%) rotate(1deg); }
            66% { transform: translate(-1%, 2%) rotate(-1deg); }
        }
        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 2rem 1.2rem;
            position: relative;
            z-index: 1;
        }

        /* ===== 启动页 ===== */
        #intro {
            text-align: center;
            padding-top: 8vh;
            animation: fadeInUp 1s ease;
        }
        .logo-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            display: block;
            animation: pulse 3s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }
        #intro h1 {
            font-family: 'ZCOOL KuaiLe', cursive;
            font-size: clamp(2.2rem, 7vw, 3.2rem);
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-gold), var(--accent-primary));
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 4s ease infinite;
        }
        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        #intro .subtitle {
            font-size: 1rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            line-height: 1.8;
        }
        .tag-line {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin: 1.5rem 0 2.5rem;
        }
        .tag {
            background: rgba(233,69,96,0.1);
            border: 1px solid rgba(233,69,96,0.2);
            color: var(--accent-primary);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
        }
        .start-btn {
            background: linear-gradient(135deg, var(--accent-primary), #c0392b);
            color: white;
            border: none;
            padding: 1.1rem 3.5rem;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 6px 30px rgba(233,69,96,0.35);
            letter-spacing: 0.05em;
            position: relative;
            overflow: hidden;
        }
        .start-btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg) translateX(-100%);
            transition: transform 0.6s;
        }
        .start-btn:hover::after {
            transform: rotate(45deg) translateX(100%);
        }
        .start-btn:hover {
            transform: translateY(-4px) scale(1.03);
            box-shadow: 0 12px 40px rgba(233,69,96,0.5);
        }
        .intro-footer {
            margin-top: 3rem;
            color: var(--text-dim);
            font-size: 0.75rem;
            line-height: 1.8;
        }

        /* ===== 星座选择模态框 ===== */
        #zodiac-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }
        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 2.5rem 2rem;
            border-radius: 24px;
            max-width: 480px;
            width: 92%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            animation: scaleIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes scaleIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .modal-content h2 {
            font-size: 1.4rem;
            margin-bottom: 0.5rem;
        }
        .modal-content p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }
        .zodiac-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.6rem;
            margin-bottom: 1rem;
        }
        .zodiac-btn {
            background: rgba(255,255,255,0.03);
            border: 1.5px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 0.7rem 0.3rem;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.82rem;
            font-family: 'Noto Sans SC', sans-serif;
        }
        .zodiac-btn:hover {
            background: rgba(233,69,96,0.12);
            border-color: var(--accent-primary);
            transform: translateY(-2px);
        }
        .zodiac-btn .emoji {
            display: block;
            font-size: 1.3rem;
            margin-bottom: 0.2rem;
        }

        /* ===== 问卷页 ===== */
        #quiz { display: none; }
        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .quiz-header .counter {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }
        .quiz-header .zodiac-badge {
            background: rgba(233,69,96,0.1);
            border: 1px solid rgba(233,69,96,0.2);
            color: var(--accent-primary);
            padding: 0.2rem 0.7rem;
            border-radius: 20px;
            font-size: 0.75rem;
        }
        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.06);
            border-radius: 2px;
            margin-bottom: 2rem;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-gold));
            width: 0%;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 2px;
        }
        .question-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2rem 1.8rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            animation: slideUp 0.5s ease;
        }
        .question-meta {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        .question-number {
            color: var(--accent-primary);
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.05em;
        }
        .question-tag {
            background: rgba(76,201,240,0.1);
            color: var(--success);
            padding: 0.15rem 0.5rem;
            border-radius: 10px;
            font-size: 0.65rem;
            font-weight: 500;
        }
        .question-text {
            font-size: 1.2rem;
            line-height: 1.7;
            margin-bottom: 1.8rem;
            font-weight: 400;
        }
        .options { display: grid; gap: 0.7rem; }
        .option {
            background: rgba(255,255,255,0.02);
            border: 1.5px solid rgba(255,255,255,0.06);
            border-radius: 14px;
            padding: 1rem 1.3rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
            font-size: 0.95rem;
            line-height: 1.6;
            color: var(--text-primary);
            position: relative;
            overflow: hidden;
        }
        .option::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 3px;
            height: 100%;
            background: var(--accent-primary);
            transform: scaleY(0);
            transition: transform 0.3s ease;
        }
        .option:hover {
            background: rgba(233,69,96,0.06);
            border-color: rgba(233,69,96,0.3);
            transform: translateX(4px);
        }
        .option:hover::before {
            transform: scaleY(1);
        }
        .option.selected {
            background: rgba(233,69,96,0.1);
            border-color: var(--accent-primary);
            box-shadow: 0 0 20px rgba(233,69,96,0.1);
        }
        .option.selected::before {
            transform: scaleY(1);
        }
        .option-letter {
            display: inline-block;
            width: 1.4rem;
            height: 1.4rem;
            line-height: 1.4rem;
            text-align: center;
            border-radius: 50%;
            background: rgba(255,255,255,0.06);
            font-size: 0.7rem;
            font-weight: 700;
            margin-right: 0.6rem;
            color: var(--text-muted);
            flex-shrink: 0;
            vertical-align: middle;
        }
        .option.selected .option-letter {
            background: var(--accent-primary);
            color: white;
        }

        /* ===== 结果页 ===== */
        #result {
            display: none;
            text-align: center;
            animation: fadeInUp 0.8s ease;
            padding-top: 5vh;
        }
        .result-stars {
            font-size: 2rem;
            margin-bottom: 1rem;
            animation: twinkle 2s ease-in-out infinite;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        .result-title {
            font-family: 'ZCOOL KuaiLe', cursive;
            font-size: 1.6rem;
            margin-bottom: 1.5rem;
            color: var(--text-muted);
        }
        .result-label {
            font-family: 'ZCOOL KuaiLe', cursive;
            font-size: clamp(1.6rem, 5vw, 2.2rem);
            font-weight: 900;
            margin-bottom: 0.5rem;
            padding: 1.2rem 1.5rem;
            background: linear-gradient(135deg, rgba(233,69,96,0.15), rgba(83,52,131,0.15));
            border: 1px solid rgba(233,69,96,0.2);
            border-radius: 16px;
            display: inline-block;
            background-clip: padding-box;
        }
        .result-subtitle {
            color: var(--accent-gold);
            font-size: 0.9rem;
            margin-bottom: 2rem;
            font-weight: 500;
        }
        .result-desc {
            font-size: 1rem;
            line-height: 2;
            color: var(--text-muted);
            max-width: 580px;
            margin: 0 auto 2rem;
            text-align: left;
            padding: 1.5rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
        }
        .result-tags {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 2.5rem;
        }
        .result-tag {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        .result-advice {
            max-width: 580px;
            margin: 0 auto 2.5rem;
            padding: 1.5rem;
            background: rgba(76,201,240,0.05);
            border: 1px solid rgba(76,201,240,0.15);
            border-radius: 16px;
            text-align: left;
        }
        .result-advice h3 {
            color: var(--success);
            font-size: 0.9rem;
            margin-bottom: 0.8rem;
        }
        .result-advice p {
            color: var(--text-muted);
            font-size: 0.9rem;
            line-height: 1.8;
        }
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }
        .restart-btn {
            background: transparent;
            color: var(--accent-primary);
            border: 2px solid var(--accent-primary);
            padding: 0.8rem 2rem;
            font-size: 1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Noto Sans SC', sans-serif;
            font-weight: 500;
        }
        .restart-btn:hover {
            background: var(--accent-primary);
            color: white;
            transform: translateY(-2px);
        }
        .share-btn {
            background: linear-gradient(135deg, var(--accent-secondary), #7b2ff7);
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            font-size: 1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Noto Sans SC', sans-serif;
            font-weight: 500;
        }
        .share-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(123,47,247,0.4);
        }
        .result-footer {
            color: var(--text-dim);
            font-size: 0.72rem;
            line-height: 1.8;
            margin-top: 1rem;
        }
        .qr-hint {
            margin-top: 2rem;
            padding: 1.5rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        .qr-hint .qr-placeholder {
            width: 150px;
            height: 150px;
            margin: 1rem auto;
            border: 2px dashed rgba(255,255,255,0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dim);
            font-size: 0.75rem;
        }

        /* ===== 动画 ===== */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== 分享弹窗 ===== */
        #share-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .share-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2.5rem 2rem;
            max-width: 400px;
            width: 90%;
            text-align: center;
            animation: scaleIn 0.4s ease;
        }
        .share-card h3 {
            margin-bottom: 1rem;
            font-size: 1.2rem;
        }
        .share-text {
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.6-all;
        }
        .copy-btn {
            background:;
            text-align: left;
            word-break: break var(--accent-primary);
            color: white;
            border: none;
            padding: 0.7rem 2rem;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.9rem;
            font-family: 'Noto Sans SC', sans-serif;
            transition: all 0.3s ease;
            margin: 0.3rem;
        }
        .copy-btn:hover { transform: translateY(-2px); }
        .close-modal-btn {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 0.7rem 2rem;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.9rem;
            font-family: 'Noto Sans SC', sans-serif;
            transition: all 0.3s ease;
            margin: 0.3rem;
        }

        /* 移动端适配 */
        @media (max-width: 480px) {
            .container { padding: 1.5rem 1rem; }
            .question-card { padding: 1.5rem 1.2rem; }
            .modal-content { padding: 2rem 1.5rem; }
            .zodiac-grid { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>
<body>
    <div class="container">

        <!-- ===== 启动页 ===== -->
        <div id="intro">
            <span class="logo-icon">🔮</span>
            <h1>SBTI 星座人格实验室</h1>
            <p class="subtitle">MBTI过时了，SBTI也该升级了<br>50道题，解码你的 <strong style="color:var(--accent-primary)">星座 × 情绪</strong> 双重人格</p>
            <div class="tag-line">
                <span class="tag">🪐 12星座融合</span>
                <span class="tag">🧠 50道灵魂拷问</span>
                <span class="tag">🎭 16种复合人格</span>
                <span class="tag">🔥 社交嘴替认证</span>
            </div>
            <button class="start-btn" onclick="showZodiacModal()">开始测试</button>
            <div class="intro-footer">
                本测试融合SBTI自嘲精神与星座文化<br>
                仅供娱乐，非专业心理测评 · 约需5-8分钟
            </div>
        </div>

        <!-- ===== 星座选择 ===== -->
        <div id="zodiac-modal">
            <div class="modal-content">
                <h2>🪐 选择你的太阳星座</h2>
                <p>这是生成你专属复合人格的关键一步</p>
                <div class="zodiac-grid">
                    <button class="zodiac-btn" onclick="selectZodiac('白羊座')"><span class="emoji">♈</span>白羊座</button>
                    <button class="zodiac-btn" onclick="selectZodiac('金牛座')"><span class="emoji">♉</span>金牛座</button>
                    <button class="zodiac-btn" onclick="selectZodiac('双子座')"><span class="emoji">♊</span>双子座</button>
                    <button class="zodiac-btn" onclick="selectZodiac('巨蟹座')"><span class="emoji">♋</span>巨蟹座</button>
                    <button class="zodiac-btn" onclick="selectZodiac('狮子座')"><span class="emoji">♌</span>狮子座</button>
                    <button class="zodiac-btn" onclick="selectZodiac('处女座')"><span class="emoji">♍</span>处女座</button>
                    <button class="zodiac-btn" onclick="selectZodiac('天秤座')"><span class="emoji">♎</span>天秤座</button>
                    <button class="zodiac-btn" onclick="selectZodiac('天蝎座')"><span class="emoji">♏</span>天蝎座</button>
                    <button class="zodiac-btn" onclick="selectZodiac('射手座')"><span class="emoji">♐</span>射手座</button>
                    <button class="zodiac-btn" onclick="selectZodiac('摩羯座')"><span class="emoji">♑</span>摩羯座</button>
                    <button class="zodiac-btn" onclick="selectZodiac('水瓶座')"><span class="emoji">♒</span>水瓶座</button>
                    <button class="zodiac-btn" onclick="selectZodiac('双鱼座')"><span class="emoji">♓</span>双鱼座</button>
                </div>
            </div>
        </div>

        <!-- ===== 问卷页 ===== -->
        <div id="quiz">
            <div class="quiz-header">
                <span class="counter" id="counter">1 / 50</span>
                <span class="zodiac-badge" id="zodiac-badge"></span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress"></div>
            </div>
            <div class="question-card">
                <div class="question-meta">
                    <span class="question-number" id="q-number"></span>
                    <span class="question-tag" id="q-tag"></span>
                </div>
                <div class="question-text" id="q-text"></div>
                <div class="options" id="options-box"></div>
            </div>
        </div>

        <!-- ===== 结果页 ===== -->
        <div id="result">
            <div class="result-stars">✨🔮✨</div>
            <div class="result-title">你的复合人格是</div>
            <div class="result-label" id="r-label"></div>
            <div class="result-subtitle" id="r-subtitle"></div>
            <div class="result-desc" id="r-desc"></div>
            <div class="result-tags" id="r-tags"></div>
            <div class="result-advice" id="r-advice">
                <h3>💡 你的生存指南</h3>
                <p id="r-advice-text"></p>
            </div>
            <div class="action-buttons">
                <button class="restart-btn" onclick="location.reload()">🔄 再测一次</button>
                <button class="share-btn" onclick="showShare()">📤 分享给朋友</button>
            </div>
            <div class="result-footer">
                *本测试融合SBTI自嘲精神与星座文化，仅供娱乐，非专业心理测评<br>
                扫描下方二维码，分享给朋友一起玩 ↓
            </div>
        </div>

        <!-- ===== 分享弹窗 ===== -->

// =====================================================================
//  全局变量
// =====================================================================
let currentQ = 0;
let scores = {lie:0, burn:0, sober:0, social:0, fire:0, earth:0, air:0, water:0};
let userZodiac = '';
const zodiacElement = {
    '白羊座':'fire','狮子座':'fire','射手座':'fire',
    '金牛座':'earth','处女座':'earth','摩羯座':'earth',
    '双子座':'air','天秤座':'air','水瓶座':'air',
    '巨蟹座':'water','天蝎座':'water','双鱼座':'water'
};

// =====================================================================
//  核心函数
// =====================================================================
function showZodiacModal() {
    document.getElementById('zodiac-modal').style.display = 'flex';
}

function selectZodiac(z) {
    userZodiac = z;
    document.getElementById('zodiac-modal').style.display = 'none';
    document.getElementById('intro').style.display = 'none';
    document.getElementById('quiz').style.display = 'block';
    document.getElementById('zodiac-badge').textContent = '🪐 ' + z;
    showQuestion();
}

function showQuestion() {
    const q = questions[currentQ];
    document.getElementById('counter').textContent = `${currentQ+1} / ${questions.length}`;
    document.getElementById('q-number').textContent = `Q${currentQ+1}`;
    
    const tagMap = {sbt:'SBTI核心', zodiac:'星座特质', mix:'灵魂拷问'};
    document.getElementById('q-tag').textContent = tagMap[q.type] || q.tag;
    
    document.getElementById('q-text').textContent = q.text;
    
    const box = document.getElementById('options-box');
    box.innerHTML = '';
    const letters = ['A','B','C','D'];
    
    q.options.forEach((opt, i) => {
        const el = document.createElement('div');
        el.className = 'option';
        el.innerHTML = `<span class="option-letter">${letters[i]}</span>${opt.text}`;
        el.onclick = () => selectOption(i);
        box.appendChild(el);
    });

    const pct = (currentQ / questions.length) * 100;
    document.getElementById('progress').style.width = pct + '%';
}

function selectOption(idx) {
    const opts = document.querySelectorAll('.option');
    opts.forEach(o => o.classList.remove('selected'));
    opts[idx].classList.add('selected');

    const s = questions[currentQ].options[idx].s;
    for (let k in s) scores[k] += s[k];

    setTimeout(() => {
        currentQ++;
        if (currentQ < questions.length) {
            showQuestion();
        } else {
            document.getElementById('progress').style.width = '100%';
            setTimeout(showResult, 300);
        }
    }, 350);
}

function showResult() {
    document.getElementById('quiz').style.display = 'none';
    document.getElementById('result').style.display = 'block';

    // SBTI主维度
    const sbtS = {lie:scores.lie, burn:scores.burn, sober:scores.sober, social:scores.social};
    const mainSbt = Object.keys(sbtS).reduce((a,b) => sbtS[a]>sbtS[b]?a:b);

    // 星座元素
    const mainEl = zodiacElement[userZodiac] || 'fire';

    const key = mainSbt + '-' + mainEl;
    const r = resultsDB[key] || resultsDB['lie-fire'];

    document.getElementById('r-label').textContent = `${userZodiac} · ${r.label}`;
    document.getElementById('r-subtitle').textContent = r.subtitle;
    document.getElementById('r-desc').textContent = r.desc;
    
    const tagsBox = document.getElementById('r-tags');
    tagsBox.innerHTML = '';
    r.tags.forEach(t => {
        const sp = document.createElement('span');
        sp.className = 'result-tag';
        sp.textContent = t;
        tagsBox.appendChild(sp);
    });

    document.getElementById('r-advice-text').textContent = r.advice;
}

function showShare() {
    const label = document.getElementById('r-label').textContent;
    const sub = document.getElementById('r-subtitle').textContent;
    const text = `🔮 我在「SBTI星座人格实验室」测出了【${label}】\n"${sub}"\n\n🧠 50道灵魂拷问 × 12星座\n解码你的星座×情绪双重人格\n\n👉 你也来测测？`;
    document.getElementById('share-text').textContent = text;
    document.getElementById('share-modal').style.display = 'flex';
}

function copyShare() {
    const text = document.getElementById('share-text').textContent;
    navigator.clipboard.writeText(text).then(() => {
        const btn = document.querySelector('.copy-btn');
        btn.textContent = '✅ 已复制！';
        setTimeout(() => btn.textContent = '📋 复制文案', 2000);
    });
}

function closeShare() {
    document.getElementById('share-modal').style.display = 'none';
}

// 点击弹窗外部关闭
document.getElementById('share-modal').addEventListener('click', function(e) {
    if (e.target === this) closeShare();
});
document.getElementById('zodiac-modal').addEventListener('click', function(e) {
    if (e.target === this) this.style.display = 'none';
});
</script>
